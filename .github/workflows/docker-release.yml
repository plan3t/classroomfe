name: Docker Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, for example v1.0.0'
        required: true
        type: string
      release_title:
        description: 'Optional GitHub release title'
        required: false
        default: ''
        type: string
      set_latest:
        description: 'Also publish the image with the latest tag'
        required: true
        default: true
        type: boolean
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  docker-release:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.release_tag }}
            type=raw,value=latest,enable=${{ inputs.set_latest }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create Git tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f "${{ inputs.release_tag }}" "${{ github.sha }}"
          git push origin "refs/tags/${{ inputs.release_tag }}" --force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_title != '' && inputs.release_title || inputs.release_tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          body: |
            Docker image published to `${{ env.IMAGE_NAME }}`.

            Published tags:
            ${{ steps.meta.outputs.tags }}

            Image digest:
            `${{ steps.build.outputs.digest }}`
