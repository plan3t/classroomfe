name: Docker Build and Push to GHCR

on:
  push:
    branches:
      - main
      - develop
  workflow_call:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v1.0.0 (leave empty to auto-increment latest tag)"
        required: false
        default: ""
        type: string
      release_title:
        description: "Optional GitHub release title"
        required: false
        default: ""
        type: string
      set_latest:
        description: "Also publish the image with the latest tag"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean
      publish_release_assets:
        description: "Generate and upload Docker image archive assets (slow, default off)"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-build-and-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Docker and release metadata
        id: vars
        run: |
          repo_name="$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')"
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_name="ghcr.io/${owner}/${repo_name}"
          short_sha="${GITHUB_SHA::7}"

          is_release="false"
          publish_latest="true"
          prerelease="false"
          release_tag=""
          release_title=""
          release_files=""
          publish_assets="false"
          image_archive_name=""
          image_checksum_name=""

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            is_release="true"

            input_tag='${{ github.event.inputs.release_tag }}'
            input_title='${{ github.event.inputs.release_title }}'
            set_latest_input='${{ github.event.inputs.set_latest }}'
            prerelease_input='${{ github.event.inputs.prerelease }}'
            publish_assets_input='${{ github.event.inputs.publish_release_assets }}'

            if [ -z "${set_latest_input}" ]; then
              set_latest_input="true"
            fi
            if [ -z "${prerelease_input}" ]; then
              prerelease_input="false"
            fi
            if [ -z "${publish_assets_input}" ]; then
              publish_assets_input="false"
            fi

            if [ -n "${input_tag}" ]; then
              release_tag="${input_tag}"
            else
              git fetch --tags --force
              latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
              if [ -z "${latest_tag}" ]; then
                release_tag="v0.0.1"
              else
                version="${latest_tag#v}"
                IFS='.' read -r major minor patch <<< "${version}"
                patch=$((patch + 1))
                release_tag="v${major}.${minor}.${patch}"
              fi
            fi

            publish_latest="${set_latest_input}"
            prerelease="${prerelease_input}"
            if [ -n "${input_title}" ]; then
              release_title="${input_title}"
            else
              release_title="${release_tag}"
            fi
            image_archive_name="${repo_name}-${release_tag}-docker-image.tar.gz"
            image_checksum_name="${repo_name}-${release_tag}-docker-image.tar.gz.sha256"

            if [ "${publish_assets_input}" = "true" ] && [ "${prerelease_input}" = "false" ]; then
              release_files="${image_archive_name} ${image_checksum_name}"
              publish_assets="true"
            fi
          fi

          version_tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version_tag="${GITHUB_REF#refs/tags/}"
          fi

          echo "repo_name=${repo_name}" >> "${GITHUB_OUTPUT}"
          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          echo "image_name=${image_name}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "version_tag=${version_tag}" >> "${GITHUB_OUTPUT}"
          echo "is_release=${is_release}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"
          echo "publish_latest=${publish_latest}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "image_archive_name=${image_archive_name}" >> "${GITHUB_OUTPUT}"
          echo "image_checksum_name=${image_checksum_name}" >> "${GITHUB_OUTPUT}"
          echo "publish_assets=${publish_assets}" >> "${GITHUB_OUTPUT}"
          echo "release_files=${release_files}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.vars.outputs.release_tag }},enable=${{ steps.vars.outputs.is_release == 'true' }}
            type=raw,value=latest,enable=${{ steps.vars.outputs.publish_latest == 'true' }}
            type=raw,value=${{ steps.vars.outputs.version_tag }}-${{ steps.vars.outputs.short_sha }},enable=${{ steps.vars.outputs.is_release != 'true' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image archive for release assets
        if: ${{ steps.vars.outputs.publish_assets == 'true' }}
        run: |
          docker pull "${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.release_tag }}"
          docker save "${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.release_tag }}" | gzip > "${{ steps.vars.outputs.image_archive_name }}"
          sha256sum "${{ steps.vars.outputs.image_archive_name }}" > "${{ steps.vars.outputs.image_checksum_name }}"

      - name: Create Git tag
        if: ${{ steps.vars.outputs.is_release == 'true' }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f "${{ steps.vars.outputs.release_tag }}" "${{ github.sha }}"
          git push origin "refs/tags/${{ steps.vars.outputs.release_tag }}" --force

      - name: Create GitHub release
        if: ${{ steps.vars.outputs.is_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.release_tag }}
          name: ${{ steps.vars.outputs.release_title }}
          prerelease: ${{ steps.vars.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            Docker image published to `${{ steps.vars.outputs.image_name }}`.

            Published tags:
            ${{ steps.meta.outputs.tags }}

            Pull command:
            `docker pull ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.release_tag }}`

            Release assets generated:
            `${{ steps.vars.outputs.publish_assets }}`

            Image digest:
            `${{ steps.build.outputs.digest }}`
          files: ${{ steps.vars.outputs.release_files }}
