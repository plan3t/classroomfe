name: Docker Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, for example v1.0.0 (leave empty to auto-increment latest tag)'
        required: false
        default: ''
        type: string
      release_title:
        description: 'Optional GitHub release title'
        required: false
        default: ''
        type: string
      set_latest:
        description: 'Also publish the image with the latest tag'
        required: true
        default: true
        type: boolean
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: true
        default: false
        type: boolean
      publish_release_assets:
        description: 'Generate and upload Docker image archive assets (slow, default off)'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-release:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        run: |
          input_tag='${{ inputs.release_tag }}'
          if [ -n "${input_tag}" ]; then
            release_tag="${input_tag}"
          else
            git fetch --tags --force
            latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
            if [ -z "${latest_tag}" ]; then
              release_tag="v0.0.1"
            else
              version="${latest_tag#v}"
              IFS='.' read -r major minor patch <<< "${version}"
              patch=$((patch + 1))
              release_tag="v${major}.${minor}.${patch}"
            fi
          fi

          should_publish_assets='${{ inputs.publish_release_assets }}'
          if [ "${should_publish_assets}" = "true" ] && [ '${{ inputs.prerelease }}' = 'false' ]; then
            release_files='classroomfe-'
            release_files+="${release_tag}"
            release_files+='-docker-image.tar.gz classroomfe-'
            release_files+="${release_tag}"
            release_files+='-docker-image.tar.gz.sha256'
            publish_assets='true'
          else
            release_files=''
            publish_assets='false'
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "image_archive_name=classroomfe-${release_tag}-docker-image.tar.gz" >> "${GITHUB_OUTPUT}"
          echo "image_checksum_name=classroomfe-${release_tag}-docker-image.tar.gz.sha256" >> "${GITHUB_OUTPUT}"
          echo "publish_assets=${publish_assets}" >> "${GITHUB_OUTPUT}"
          echo "release_files=${release_files}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.resolve_tag.outputs.release_tag }}
            type=raw,value=latest,enable=${{ inputs.set_latest }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image archive for release assets
        if: ${{ steps.resolve_tag.outputs.publish_assets == 'true' }}
        run: |
          docker pull "${IMAGE_NAME}:${{ steps.resolve_tag.outputs.release_tag }}"
          docker save "${IMAGE_NAME}:${{ steps.resolve_tag.outputs.release_tag }}" | gzip > "${{ steps.resolve_tag.outputs.image_archive_name }}"
          sha256sum "${{ steps.resolve_tag.outputs.image_archive_name }}" > "${{ steps.resolve_tag.outputs.image_checksum_name }}"

      - name: Create Git tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f "${{ steps.resolve_tag.outputs.release_tag }}" "${{ github.sha }}"
          git push origin "refs/tags/${{ steps.resolve_tag.outputs.release_tag }}" --force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.release_tag }}
          name: ${{ inputs.release_title != '' && inputs.release_title || steps.resolve_tag.outputs.release_tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          body: |
            Docker image published to `${{ env.IMAGE_NAME }}`.

            Published tags:
            ${{ steps.meta.outputs.tags }}

            Pull command:
            `docker pull ${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.release_tag }}`

            Release assets generated:
            `${{ steps.resolve_tag.outputs.publish_assets }}`

            Image digest:
            `${{ steps.build.outputs.digest }}`
          files: ${{ steps.resolve_tag.outputs.release_files }}
